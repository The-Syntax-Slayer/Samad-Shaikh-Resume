<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samad Shaikh - Terminal Access</title>
    <meta name="description" content="Cyber Ghost secure gateway. Access the professional CV and technological profile of Samad Shaikh.">
    <link rel="icon" type="image/png" href="profile.png">
    
    <!-- Link External Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Load Deferred Scripts -->
    <script defer src="script.js"></script>
</head>
<body>

    <!-- Fullscreen Matrix Canvas Background -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Scanline overlay effect -->
    <div class="scanlines"></div>

    <!-- HUD Card Container -->
    <div class="container">
        <div class="hud-card">
            <!-- Neon corner decorations -->
            <div class="corner-tl"></div>
            <div class="corner-br"></div>

            <!-- Profile / Identity scanning animation -->
            <div class="profile-section">
                <div class="avatar-container">
                    <div class="avatar-scanner"></div>
                    <div class="avatar-laser"></div>
                    <img src="profile.png" alt="Samad Shaikh" class="avatar-image">
                </div>
                <h1>Samad Shaikh</h1>
                <div class="ghost-tag">CYBER GHOST // ARCHITECT</div>
            </div>

            <!-- Virtual System Status display -->
            <div class="sys-status">
                <div class="status-row">
                    <span class="status-label">HOSTNAME:</span>
                    <span class="status-val">samadshaikh.me</span>
                </div>
                <div class="status-row">
                    <span class="status-label">NODE STATUS:</span>
                    <span class="status-online">SECURE // ONLINE</span>
                </div>
                <div class="status-row">
                    <span class="status-label">ACCESS POINT:</span>
                    <span class="status-val">GITHUB PAGES</span>
                </div>
                <div class="status-row">
                    <span class="status-label">ENCRYPTION:</span>
                    <span class="status-val">AES-256-GCM / TLS 1.3</span>
                </div>
            </div>

            <!-- Main Actions -->
            <div class="console-buttons">
                <!-- Launches the terminal simulator overlay -->
                <button id="view-resume-btn" class="cyber-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"></polyline>
                        <line x1="12" y1="19" x2="20" y2="19"></line>
                    </svg>
                    View Resume
                </button>

                <!-- Direct download payload path -->
                <a href="https://drive.google.com/uc?export=download&id=1rPcj4LzL2tRjWXfr22Qxab70JZl8oFyi" class="cyber-btn cyber-btn-alt" download="Resume_Samad_Shaikh.pdf">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download PDF
                </a>
            </div>
        </div>
    </div>

    <!-- INTERACTIVE TERMINAL WINDOW (MODAL OVERLAY) -->
    <div id="terminal-overlay" class="terminal-overlay">
        <div class="terminal-window">
            
            <!-- Window title bar controls -->
            <div class="terminal-header">
                <div class="window-controls">
                    <div id="terminal-close" class="control-dot dot-close"></div>
                    <div class="control-dot dot-min"></div>
                    <div class="control-dot dot-max"></div>
                </div>
                <div class="terminal-title">guest@cyberghost: ~ (sh)</div>
                <div style="width: 50px;"></div> <!-- Empty flex spacing -->
            </div>

            <!-- Terminal execution log window -->
            <div id="terminal-body" class="terminal-body">
                <div id="terminal-log">
                    <!-- Logs printed dynamically via script.js -->
                </div>

                <!-- Hidden Iframe panel for PDF document preview -->
                <div id="resume-embed-container" class="resume-embed-container">
                    <!-- Retro Loading Widget -->
                    <div id="iframe-loader" class="cyber-loader">
                        <div class="spinner"></div>
                        <div class="loader-text">DECRYPTING PACKET...</div>
                    </div>
                    <iframe id="resume-iframe" class="resume-iframe" src=""></iframe>
                </div>

                <!-- Input prompt bar -->
                <div class="terminal-input-row">
                    <span class="prompt-prefix">guest@cyberghost:~$</span>
                    <input type="text" id="terminal-input" class="terminal-input" autocomplete="off" autofocus placeholder="Type 'help' for protocol list...">
                    <span class="terminal-cursor"></span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
